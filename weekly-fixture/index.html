<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHC Weekly Fixture</title>
    <meta name="description" content="This week's Footscray Hockey Club fixtures across Premier League, Seniors, Midweek and Juniors." />
    <meta name="theme-color" content="#0b1a3a" />

    <link rel="icon" type="image/png" href="/icons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="shortcut icon" href="/icons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="FHC Fixture" />
    <link rel="manifest" href="/icons/site.webmanifest" />

    <!-- Open Graph / social previews -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FHC Weekly Fixture" />
    <meta property="og:description" content="This week's Footscray Hockey Club fixtures." />
    <meta property="og:url" content="https://fhc-fixtures.netlify.app/" />
    <meta property="og:image" content="https://fhc-fixtures.netlify.app/images/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://fhc-fixtures.netlify.app/images/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">

    <script src="/js/analytics.js" defer></script>
</head>
<body>
    <div class="card" id="card">
        <div class="card-bg"></div>
        <div class="card-vignette"></div>

        <div class="card-content">
            <div class="sticky-header">
                <p class="tagline">DON'T MISS THE ACTION <span class="chevrons">«««</span></p>
                <h1 class="view-title" id="viewTitle">FIXTURES</h1>

                <nav class="view-tabs" id="viewTabs"></nav>
            </div>

            <div class="fixtures" id="fixtures">
                <div class="loading">Loading fixtures…</div>
            </div>

            <div class="subscribe-cta">
                <a href="subscribe.html">📅 Subscribe to the calendar</a>
            </div>

            <footer class="card-footer">
                <img src="/images/logos/FHC.png" alt="FHC" />
                <span>FOOTSCRAY <strong>HOCKEY CLUB</strong></span>
            </footer>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
