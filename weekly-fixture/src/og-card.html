<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet">
<style>
    :root {
        --navy-1: #0b1a3a;
        --navy-2: #1b3a76;
        --red:    #d90b2d;
        --white:  #ffffff;
    }
    html, body { margin: 0; padding: 0; }
    body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        color: var(--white);
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: #000;
    }
    .card {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }
    .card::before {
        content: '';
        position: absolute; inset: 0;
        background:
            radial-gradient(1200px 600px at 30% 20%, rgba(255,255,255,0.06), transparent 60%),
            radial-gradient(900px 700px at 85% 85%, rgba(217, 11, 45, 0.45), transparent 60%),
            linear-gradient(160deg, var(--navy-1) 0%, var(--navy-2) 55%, var(--navy-1) 100%);
        z-index: 0;
    }
    .card::after {
        content: '';
        position: absolute;
        right: -60px;
        bottom: -80px;
        width: 520px;
        height: 260px;
        background: var(--red);
        transform: rotate(-12deg);
        border-radius: 240px 60px 160px 80px;
        opacity: 0.9;
        z-index: 1;
    }
    .content {
        position: relative;
        z-index: 2;
        padding: 70px 80px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    .tagline {
        margin: 0;
        font-weight: 800;
        letter-spacing: 4px;
        font-size: 22px;
        text-transform: uppercase;
    }
    .chevrons {
        color: var(--red);
        margin-left: 10px;
        letter-spacing: -2px;
        font-weight: 900;
    }
    .title-group {
        display: flex;
        align-items: center;
        gap: 48px;
    }
    .title-text { flex: 1; }
    h1 {
        margin: 0;
        font-style: italic;
        font-weight: 900;
        font-size: 130px;
        line-height: 0.9;
        letter-spacing: -3px;
        text-transform: uppercase;
    }
    .club-line {
        margin: 24px 0 0;
        font-weight: 800;
        letter-spacing: 4px;
        font-size: 22px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.9);
    }
    .club-line strong { color: var(--white); font-weight: 900; }
    .logo-wrap {
        width: 220px;
        height: 220px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255,255,255,0.08);
        border: 2px solid rgba(255,255,255,0.2);
        border-radius: 24px;
    }
    .logo-wrap img {
        width: 170px;
        height: 170px;
        object-fit: contain;
    }
    .footer {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        font-weight: 700;
        letter-spacing: 3px;
        font-size: 18px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.75);
    }
    .badge {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        padding: 10px 18px;
        border-radius: 999px;
        font-weight: 800;
        letter-spacing: 2px;
        font-size: 16px;
    }
</style>
</head>
<body>
<div class="card">
    <div class="content">
        <p class="tagline">DON'T MISS THE ACTION <span class="chevrons">«««</span></p>

        <div class="title-group">
            <div class="title-text">
                <h1>Weekly<br/>Fixtures</h1>
                <p class="club-line">Footscray <strong>Hockey Club</strong></p>
            </div>
            <div class="logo-wrap">
                <img src="../images/logos/FHC.png" alt="FHC" />
            </div>
        </div>

        <div class="footer">
            <span class="badge">PL · Seniors · Midweek · Juniors</span>
            <span>hockeyvictoria.org.au</span>
        </div>
    </div>
</div>
</body>
</html>
