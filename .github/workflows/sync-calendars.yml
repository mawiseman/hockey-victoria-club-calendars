name: Sync Hockey Victoria Calendars

on:
  schedule:
    # Run daily at 2 AM Melbourne time (adjust as needed)
    - cron: '0 16 * * *'  # 4 PM UTC = 2 AM AEST/3 AM AEDT
  workflow_dispatch:  # Allow manual triggering
    inputs:
      competition:
        description: 'Single competition to process (leave empty to process all)'
        required: false
        type: string
      use_cache:
        description: 'Use cached results from previous runs'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  sync-calendars:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit fixtures.json / subscribe-data.json / docs back to main
      issues: write    # needed for the scrape-failure reporting step to open/update an issue

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      
      - name: Create service account key file from secret
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_KEY_JSON }}' > service-account-key.json
          # Validate that the JSON is properly formatted
          jq empty service-account-key.json || (echo "Invalid JSON in SERVICE_ACCOUNT_KEY_JSON secret" && exit 1)
      
      - name: Install dependencies
        run: npm ci || npm install
      
      - name: Run calendar sync for all competitions
        if: ${{ github.event.inputs.competition == '' || github.event.inputs.competition == null }}
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY_JSON }}
        run: |
          if [[ "${{ github.event.inputs.use_cache }}" == "true" ]]; then
            npm run process-all-competitions -- --all --use-cache
          else
            npm run process-all-competitions -- --all
          fi
      
      - name: Run calendar sync for single competition
        if: ${{ github.event.inputs.competition != '' && github.event.inputs.competition != null }}
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY_JSON }}
        run: |
          if [[ "${{ github.event.inputs.use_cache }}" == "true" ]]; then
            npm run process-competition -- --competition "${{ github.event.inputs.competition }}" --include-inactive --use-cache
          else
            npm run process-competition -- --competition "${{ github.event.inputs.competition }}" --include-inactive
          fi
      
      # Refresh isActive on every competition so finished seasons drop off
      # the published views automatically. Run before scraping scores so
      # the score scraper can skip inactive comps.
      - name: Update competition active/inactive status
        if: success()
        continue-on-error: true
        run: npm run update-competition-status

      # Scrape match scores from each active competition's HV team page so
      # generate-fixtures-json can merge them into events. Failures here are
      # tolerated — events ship without scores rather than blocking the sync.
      - name: Scrape scores
        if: success()
        continue-on-error: true
        run: npm run scrape-scores

      # Scrape the ladder (pointscore) for each active competition. Same
      # tolerance as scores — partial data is fine, the generator merges
      # whatever's available.
      - name: Scrape ladders
        if: success()
        continue-on-error: true
        run: npm run scrape-ladders

      # Surface only *complete* scrape failures (comps that failed both the
      # retry loop and the second pass). Per-request retries are logged in the
      # scrape steps but never raised here. Runs even if a scrape step errored
      # so a hard crash still gets reported via the missing/failed payload.
      - name: Report scrape failures
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const read = (p) => { try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return null; } };
            const sources = [
              { name: 'Ladders', payload: read('temp/ladders.json') },
              { name: 'Scores',  payload: read('temp/scores.json') },
            ];

            const failures = [];
            let summary = '## Scrape results\n\n';
            for (const s of sources) {
              if (!s.payload) {
                summary += `- **${s.name}**: ⚠️ no data file (scraper may have crashed)\n`;
                failures.push({ source: s.name, comps: ['(scraper produced no output)'] });
                continue;
              }
              const list = s.payload.failedCompetitions || [];
              const scraped = s.payload.competitionsScraped ?? '?';
              summary += `- **${s.name}**: ${scraped} scraped, ${list.length} failed completely\n`;
              if (list.length) failures.push({ source: s.name, comps: list });
            }
            if (failures.length) {
              summary += '\n### ❌ Complete failures\n';
              for (const f of failures) summary += `- **${f.source}**: ${f.comps.join(', ')}\n`;
            }
            await core.summary.addRaw(summary).write();

            if (!failures.length) {
              core.info('No complete scrape failures.');
              return;
            }
            for (const f of failures) core.error(`${f.source} failed completely for: ${f.comps.join(', ')}`);

            // File one deduped issue rather than a fresh one every day: reuse an
            // open issue carrying our marker, otherwise create it.
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- scrape-failure-report -->';
            const lines = failures.map(f => `- **${f.source}**: ${f.comps.join(', ')}`).join('\n');
            const body = `${marker}\nOne or more competitions failed to scrape completely (after retries + a second pass).\n\n${lines}\n\nRun: ${runUrl}`;

            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'scrape-failure', per_page: 20,
            });
            const existing = open.data.find(i => (i.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body,
              });
              core.info(`Updated existing scrape-failure issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: 'Scrape failures: competitions missing data',
                body, labels: ['bug', 'automated', 'scrape-failure'],
              });
              core.info('Created scrape-failure issue');
            }

      - name: Regenerate fixtures.json + season.json + subscribe-data + docs
        if: success()
        run: |
          npm run generate-fixtures-json
          npm run generate-season-json
          npm run generate-docs

      - name: Commit generated files
        id: commit
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/competitions.json weekly-fixture/data/fixtures.json weekly-fixture/data/season.json weekly-fixture/data/subscribe-data.json docs/competitions.md docs/competitions-mobile.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto-sync fixtures + docs"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # The browser fetches fixtures.json + subscribe-data.json directly from
      # jsDelivr, which mirrors GitHub but caches @main refs for ~12h. Purge
      # so users see the new data within seconds instead of overnight.
      - name: Purge jsDelivr cache
        if: steps.commit.outputs.pushed == 'true'
        run: |
          curl -fsS "https://purge.jsdelivr.net/gh/mawiseman/hockey-victoria-club-calendars@main/weekly-fixture/data/fixtures.json" || true
          curl -fsS "https://purge.jsdelivr.net/gh/mawiseman/hockey-victoria-club-calendars@main/weekly-fixture/data/season.json" || true
          curl -fsS "https://purge.jsdelivr.net/gh/mawiseman/hockey-victoria-club-calendars@main/weekly-fixture/data/subscribe-data.json" || true

      - name: Cleanup service account key
        if: always()
        run: rm -f service-account-key.json
      
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: sync-logs
          path: temp/
          retention-days: 7

  notify-on-failure:
    needs: sync-calendars
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v8
        with:
          script: |
            const date = new Date().toISOString();
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Calendar Sync Failed - ${date}`,
              body: `The calendar synchronization workflow failed.\n\n${ context.payload.inputs?.competition ? `Competition: ${context.payload.inputs.competition}\n` : 'Mode: All competitions\n' }Run URL: ${runUrl}\n\nPlease check the logs for more information.`,
              labels: ['bug', 'automated']
            });
