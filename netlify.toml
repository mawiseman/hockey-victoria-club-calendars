# Netlify deploy config for the weekly-fixture site.
#
# This is a static site — no build step. The folder `weekly-fixture/` is
# served as the site root, so `index.html` at Netlify root = `weekly-fixture/index.html`.

[build]
  publish = "weekly-fixture"
  # No command needed; everything is already built / committed in git.
  # `subscribe-data.json` is generated by `npm run generate-docs` and committed
  # by the scheduled GitHub Action.

# ─── CORS proxy for Google Calendar iCal feeds ─────────────────────
# Fetching calendar.google.com directly from the browser fails CORS;
# using corsproxy.io rate-limits us. This rewrites requests to
# /proxy/calendar/* so the browser sees a same-origin response, and
# Netlify fetches the upstream on our behalf.
[[redirects]]
  from = "/proxy/calendar/*"
  to = "https://calendar.google.com/calendar/:splat"
  status = 200
  force = true

# ─── Caching headers ───────────────────────────────────────────────
# Data files change weekly — let browsers revalidate quickly.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# HTML: short cache so tab/content changes ship quickly.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Logos + OG image rarely change.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Icons / favicon pack.
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# CSS/JS — hash-less filenames, so keep caching modest until we add fingerprinting.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
