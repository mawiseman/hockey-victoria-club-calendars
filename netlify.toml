# Netlify deploy config for the weekly-fixture site.
#
# This is a static site — no build step. The folder `weekly-fixture/` is
# served as the site root, so `index.html` at Netlify root = `weekly-fixture/index.html`.

[build]
  publish = "weekly-fixture"
  # No command needed; everything is already built / committed in git.
  # `subscribe-data.json` is generated by `npm run generate-docs` and committed
  # by the scheduled GitHub Action.

  # Skip the deploy when only files under weekly-fixture/data/ changed —
  # the static site fetches data at runtime via jsDelivr, so data-only commits
  # don't need a rebuild. `ignore` returns 0 to skip, non-zero to build.
  # CACHED_COMMIT_REF is the last-deployed commit; if it's unset (first deploy
  # after cache clear), fall through and build.
  ignore = "test -n \"$CACHED_COMMIT_REF\" && git diff --quiet \"$CACHED_COMMIT_REF\" \"$COMMIT_REF\" -- weekly-fixture/ ':(exclude)weekly-fixture/data/' netlify.toml"

# ─── Caching headers ───────────────────────────────────────────────
# Data files change weekly — let browsers revalidate quickly.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# HTML: short cache so tab/content changes ship quickly.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Logos + OG image rarely change.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Icons / favicon pack.
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# CSS/JS — hash-less filenames, so keep caching modest until we add fingerprinting.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Service worker must be revalidated every navigation so users pick up new
# versions on next visit. Browsers also refuse SWs served with a long max-age.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"
